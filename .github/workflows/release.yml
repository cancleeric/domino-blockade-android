name: Release

on:
  push:
    branches: [ main ]

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    # Skip when this workflow itself commits the version bump
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            cp app/google-services.json.ci app/google-services.json
          fi

      - name: Bump versionCode and push
        id: bump_version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            git fetch origin main
            git rebase origin/main

            CURRENT_VERSION=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts)
            NEW_VERSION=$((CURRENT_VERSION + 1))
            VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)

            sed -i "s/versionCode = ${CURRENT_VERSION}/versionCode = ${NEW_VERSION}/" app/build.gradle.kts
            git add app/build.gradle.kts
            git commit -m "chore: bump versionCode to ${NEW_VERSION} [skip ci]"

            git push origin main && break || {
              if [ "$i" -eq "$MAX_RETRIES" ]; then exit 1; fi
              git reset --soft HEAD~1
              sleep $((i * 5))
            }
          done

          echo "new_version_code=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION_NAME}.${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            {
              echo "storeFile=keystore.jks"
              echo "storePassword=${STORE_PASSWORD}"
              echo "keyAlias=${KEY_ALIAS}"
              echo "keyPassword=${KEY_PASSWORD}"
            } > keystore.properties
          fi

      - name: Build signed release APK
        run: ./gradlew assembleRelease

      - name: Upload Crashlytics mapping file
        run: ./gradlew uploadCrashlyticsMappingFileRelease

      - name: Locate APK
        id: locate_apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Create Git tag
        run: |
          git tag ${{ steps.bump_version.outputs.tag }}
          git push origin ${{ steps.bump_version.outputs.tag }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_PATH="${{ steps.locate_apk.outputs.apk_path }}"
          TAG="${{ steps.bump_version.outputs.tag }}"
          if [ -f "$APK_PATH" ]; then
            gh release create "$TAG" \
              --title "Release $TAG" \
              --generate-notes \
              "$APK_PATH#domino-blockade-${TAG}.apk"
          else
            gh release create "$TAG" \
              --title "Release $TAG" \
              --generate-notes
          fi
